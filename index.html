<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      * {
        box-sizing: border-box;
        padding: 0;
        margin: 0;
      }
      body {
        background-color: rgb(36, 35, 35);
        display: flex;
        justify-content: center;
        margin-top: 7rem;
      }
      .container {
        display: flex;
        flex-direction: column;
        width: 100%;
        max-width: 750px;
        height: 230px;
        background-color: #ffffffff;
      }
      .text-1 {
        font-family: Verdana, "DejaVu Sans", sans-serif;
        text-align: center;
        padding: 1rem;
        color: rgb(36, 35, 35);
        font-weight: 700;
        font-size: 15px;
      }
      .veges-card {
        display: flex;
        gap: 52px;
        margin: 1rem;
      }
      .card-1 {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
      }
      .img-1 {
        width: 50px;
        height: 50px;
      }
      .text-2 {
        font-family: Verdana, "DejaVu Sans", sans-serif;
        text-align: center;
        padding: 1rem;
        color: rgb(76, 75, 75);
        font-weight: 200;
        font-size: 15px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <p class="text-1">Information !</p>
      <div class="veges-card">
        <div class="card-1">
          <img src="/images/barberry.png" alt="barberry" class="img-1" />
          <p class="text-2">This is a type of plant .We love this one.</p>
        </div>
        <div class="card-1">
          <img src="/images/chilli.png" alt="chilli" class="img-1" />
          <p class="text-2">This is another type of plant.Isn't it nice ?</p>
        </div>
        <div class="card-1">
          <img src="/images/pepper.png" alt="pepper" class="img-1" />
          <p class="text-2">We have so many plants.Yay plants.</p>
        </div>
      </div>
    </div>
  </body>
</html>
